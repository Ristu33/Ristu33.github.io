<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我去</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #050505;
            color: #121212;
            font-family: 'Courier New', Courier, monospace;
            font-size: 8px; 
            font-weight: bold;
            line-height: 6.5px; 
            letter-spacing: 1.2px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        
        #play-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }

        .play-hint {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: pulse 1.8s infinite;
        }

        .play-sub {
            color: #666;
            margin-top: 15px;
            font-size: 13px;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.6; transform: scale(0.98); }
        }

        
        #ascii-container {
            background: #000;
            width: 500px;  
            height: 500px; 
            border: 2px solid #333;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.95), inset 0 0 20px rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #ascii-display {
            white-space: pre;
            display: block;
            margin: auto;
            text-align: center;
        }

        
        .bright {
            color: #ffffff;
            text-shadow: 0 0 4px #ffffff, 0 0 8px rgba(255, 255, 255, 0.6);
        }

        
        .dark {
            color: #121212;
        }

        video {
            display: none;
        }
    </style>
</head>
<body>

<div id="play-overlay" onclick="startPlayback()">
    <div class="play-hint">▶ CLICK TO PLAY</div>
    <div class="play-sub">點擊播放</div>
</div>

<div id="ascii-container">
    <div id="ascii-display"></div>
</div>

<video id="video-element" loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>
<canvas id="hidden-canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video-element');
    const canvas = document.getElementById('hidden-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const display = document.getElementById('ascii-display');
    const overlay = document.getElementById('play-overlay');


    const COLS = 72; 
    const ROWS = 72; 

    
    let initialScreen = "";
    for(let y=0; y<ROWS; y++) {
        initialScreen += "0".repeat(COLS) + "\n";
    }
    display.textContent = initialScreen;

    function startPlayback() {
        
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 400);

        
        video.play().then(() => {
            render();
        }).catch(err => {
            alert("播放失敗");
        });
    }

    function render() {
        if (video.paused || video.ended) {
            requestAnimationFrame(render);
            return;
        }

        canvas.width = COLS;
        canvas.height = ROWS;

        
        ctx.drawImage(video, 0, 0, COLS, ROWS);

        const imgData = ctx.getImageData(0, 0, COLS, ROWS);
        const data = imgData.data;
        let asciiFrame = "";

        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                const idx = (y * COLS + x) * 4;
                const r = data[idx];
                const g = data[idx+1];
                const b = data[idx+2];
                
                const brightness = 0.299 * r + 0.587 * g + 0.114 * b;

                
                if (brightness > 115) {
                    asciiFrame += "<span class='bright'>0</span>";
                } else {
                    asciiFrame += "<span class='dark'>0</span>";
                }
            }
            asciiFrame += "\n";
        }

        display.innerHTML = asciiFrame;
        requestAnimationFrame(render);
    }
</script>

</body>
</html>
